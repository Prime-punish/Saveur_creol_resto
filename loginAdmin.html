<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Accès sécurisé à l'administration Saveur Créole">
    <title>Admin | Saveur Créole</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* VARIABLES & BASE*/
        :root {
            --primary-color: #C00000;
            --primary-dark: #8B0000;
            --primary-light: #FF6B6B;
            --accent-color: #FF6B6B;
            --background-light: #FFF9F9;
            --text-dark: #333333;
            --text-light: #FFFFFF;
            --text-gray: #666666;
            --shadow-sm: 0 2px 8px rgba(0,0,0,.10);
            --shadow-md: 0 4px 12px rgba(0,0,0,.15);
            --shadow-lg: 0 8px 24px rgba(0,0,0,.20);
            --shadow-xl: 0 12px 32px rgba(0,0,0,.25);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 50%, #4a0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Décoration d'arrière-plan */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,107,107,0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(255,215,0,0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* CARTE DE LOGIN*/
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            border: none;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            overflow: hidden;
            animation: cardSlideIn 0.5s ease-out;
        }

        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color), var(--primary-light));
        }

        .login-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .login-logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: white;
            font-size: 1.8rem;
            box-shadow: var(--shadow-md);
        }

        .login-title {
            font-weight: 700;
            color: var(--primary-dark);
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }

        .login-subtitle {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .login-body {
            padding: 1.5rem 2rem 2rem;
        }

        /* =====================================================
           FORMULAIRE
        ===================================================== */
        .form-label {
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label i { color: var(--accent-color); }

        .form-control {
            border: 2px solid rgba(192,0,0,0.2);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: var(--transition);
            background: #fff;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(255,107,107,0.15);
            transform: translateY(-1px);
        }

        .form-control.is-invalid {
            border-color: #dc3545;
            box-shadow: 0 0 0 4px rgba(220,53,69,0.1);
        }

        .form-control.is-valid {
            border-color: #198754;
            box-shadow: 0 0 0 4px rgba(25,135,84,0.1);
        }

        .invalid-feedback, .valid-feedback {
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        /* Password toggle */
        .password-wrapper { position: relative; }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            padding: 4px;
            transition: var(--transition);
            z-index: 2;
        }

        .password-toggle:hover { color: var(--primary-color); }

        /* Remember & Forgot */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0 1.5rem;
            font-size: 0.85rem;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .form-check-input {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(192,0,0,0.3);
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .forgot-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .forgot-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* Bouton de connexion */
        .btn-login {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.85rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-dark), #660000);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-login:active:not(:disabled) { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: inline-block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Messages */
        .alert-custom {
            border-radius: 12px;
            border: none;
            font-size: 0.9rem;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success {
            background: rgba(25,135,84,0.1);
            color: #198754;
            border-left: 4px solid #198754;
        }

        .alert-error {
            background: rgba(220,53,69,0.1);
            color: #dc3545;
            border-left: 4px solid #dc3545;
        }

        /* Footer de la carte */
        .login-footer {
            text-align: center;
            padding: 1rem 2rem 1.5rem;
            border-top: 1px solid rgba(0,0,0,0.06);
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover { text-decoration: underline; }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .login-card { border-radius: 16px; }
            .login-header, .login-body, .login-footer { padding-left: 1.5rem; padding-right: 1.5rem; }
            .login-title { font-size: 1.25rem; }
        }

        /*  ACCESSIBILITÉ & PRÉFÉRENCES */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        .form-control:focus-visible,
        .btn-login:focus-visible,
        .password-toggle:focus-visible {
            outline: 3px solid var(--accent-color);
            outline-offset: 2px;
        }

        /* Animation de shake pour erreur */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .shake { animation: shake 0.3s ease; }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Header -->
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1 class="login-title">Espace Admin</h1>
            <p class="login-subtitle">Accès sécurisé à l'administration Saveur Créole</p>
        </div>

        <!--Formulaire -->
        <div class="login-body">
            <form id="loginForm" novalidate>
                
                <!-- Champ Email -->
                <div class="mb-3">
                    <label for="userEmail" class="form-label">
                        <i class="fas fa-envelope"></i> Email administrateur
                    </label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="userEmail" 
                        name="email"
                        required 
                        placeholder="admin@saveurcreole.ht"
                        autocomplete="email"
                        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                    >
                    <div class="invalid-feedback">Veuillez entrer une adresse email valide.</div>
                </div>

                <!-- Champ Mot de passe -->
                <div class="mb-3">
                    <label for="userPassword" class="form-label">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            class="form-control" 
                            id="userPassword" 
                            name="password"
                            required 
                            placeholder="••••••••"
                            autocomplete="current-password"
                            minlength="8"
                        >
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Afficher/masquer le mot de passe">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback">Le mot de passe doit contenir au moins 8 caractères.</div>
                </div>

                <!-- Options -->
                <div class="form-options">
                    <label class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <span>Se souvenir de moi</span>
                    </label>
                    <a href="#" class="forgot-link" id="forgotLink">Mot de passe oublié ?</a>
                </div>

                <!-- Messages dynamiques -->
                <div id="formMessage" class="alert-custom d-none" role="alert"></div>

                <!-- Bouton de soumission -->
                <button type="submit" class="btn-login" id="submitBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt me-2"></i>Se connecter</span>
                    <span class="spinner"></span>
                </button>

            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>
                <i class="fas fa-lock me-1"></i>
                Connexion chiffrée • 
                <a href="#" id="helpLink">Besoin d'aide ?</a>
            </p>
            <p class="mt-1" style="font-size: 0.75rem; opacity: 0.7;">
                © 2026 Saveur Créole — Tous droits réservés
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
     
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('userEmail');
            const passwordInput = document.getElementById('userPassword');
            const togglePassword = document.getElementById('togglePassword');
            const rememberMe = document.getElementById('rememberMe');
            const submitBtn = document.getElementById('submitBtn');
            const formMessage = document.getElementById('formMessage');
            const forgotLink = document.getElementById('forgotLink');
            const helpLink = document.getElementById('helpLink');

            let isLoading = false;
            let loginAttempts = 0;
            const MAX_ATTEMPTS = 5;
            const LOCKOUT_TIME = 5 * 60 * 1000;
            init();

            function init() {
                const savedEmail = localStorage.getItem('saveurAdminEmail');
                if (savedEmail) {
                    emailInput.value = savedEmail;
                    rememberMe.checked = true;
                }
                checkLockout();

                setupEventListeners();
            }

            function setupEventListeners() {
                
                togglePassword.addEventListener('click', togglePasswordVisibility);

                emailInput.addEventListener('blur', () => validateField(emailInput));
                passwordInput.addEventListener('blur', () => validateField(passwordInput));
                emailInput.addEventListener('input', () => clearFieldError(emailInput));
                passwordInput.addEventListener('input', () => clearFieldError(passwordInput));

                form.addEventListener('submit', handleLogin);

                forgotLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    showMessage('Contactez l\'administrateur principal pour réinitialiser votre mot de passe.', 'success');
                });

                helpLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    showMessage('Support: support@saveurcreole.ht | +509 4356 7890', 'success');
                });

                [emailInput, passwordInput].forEach(input => {
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' && !form.checkValidity()) {
                            e.preventDefault();
                            form.reportValidity();
                        }
                    });
                });
            }

            function togglePasswordVisibility() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                togglePassword.innerHTML = type === 'password' 
                    ? '<i class="fas fa-eye"></i>' 
                    : '<i class="fas fa-eye-slash"></i>';
                passwordInput.focus();
            }

            function validateField(field) {
                if (field.validity.valid) {
                    field.classList.remove('is-invalid');
                    field.classList.add('is-valid');
                    return true;
                } else {
                    field.classList.remove('is-valid');
                    field.classList.add('is-invalid');
                    return false;
                }
            }

            function clearFieldError(field) {
                field.classList.remove('is-invalid', 'is-valid');
                hideMessage();
            }

            async function handleLogin(e) {
                e.preventDefault();
                
                if (isLoading) return;

               
                const isEmailValid = validateField(emailInput);
                const isPasswordValid = validateField(passwordInput);

                if (!isEmailValid || !isPasswordValid) {
                    showMessage('Veuillez corriger les erreurs dans le formulaire.', 'error');
                   
                    document.querySelector('.login-card').classList.add('shake');
                    setTimeout(() => document.querySelector('.login-card').classList.remove('shake'), 300);
                    return;
                }

                
                setLoading(true);
                hideMessage();

                try {
                    
                    await simulateLoginAPI(emailInput.value, passwordInput.value);
                    
                    if (rememberMe.checked) {
                        localStorage.setItem('saveurAdminEmail', emailInput.value);
                    } else {
                        localStorage.removeItem('saveurAdminEmail');
                    }
                    
                    localStorage.removeItem('saveurAdminLockout');
                    
                    showMessage('✅ Connexion réussie ! Redirection...', 'success');
                    
                    setTimeout(() => {
                       
                        console.log('→ Redirection vers le dashboard admin');
                    }, 1500);

                } catch (error) {
                    loginAttempts++;
                    
                    if (loginAttempts >= MAX_ATTEMPTS) {
                        setLockout();
                        showMessage(`🔒 Trop de tentatives. Veuillez réessayer dans 5 minutes.`, 'error');
                    } else {
                        showMessage(error.message || 'Email ou mot de passe incorrect.', 'error');
                    }
                    
                    passwordInput.value = '';
                    passwordInput.focus();
                    
                } finally {
                    setLoading(false);
                }
            }

            function simulateLoginAPI(email, password) {
                return new Promise((resolve, reject) => {
                        setTimeout(() => {
                        const DEMO_EMAIL = 'admin@saveurcreole.ht';
                        const DEMO_PASS = 'Saveur2026!';
                        
                        if (email === DEMO_EMAIL && password === DEMO_PASS) {
                            resolve({ success: true, token: 'demo_token_xyz' });
                        } else {
                            reject(new Error('Identifiants incorrects'));
                        }
                    }, 1200); 
                });
            }

            function setLoading(loading) {
                isLoading = loading;
                submitBtn.classList.toggle('loading', loading);
                submitBtn.disabled = loading;
                [emailInput, passwordInput, rememberMe, togglePassword].forEach(el => {
                    el.disabled = loading;
                });
            }
            function showMessage(text, type = 'error') {
                formMessage.textContent = text;
                formMessage.className = `alert-custom alert-${type === 'error' ? 'error' : 'success'}`;
                formMessage.classList.remove('d-none');
                formMessage.setAttribute('aria-live', 'polite');
                
                if (type === 'success') {
                    setTimeout(() => hideMessage(), 4000);
                }
            }

            function hideMessage() {
                formMessage.classList.add('d-none');
                formMessage.textContent = '';
            }
            function checkLockout() {
                const lockout = localStorage.getItem('saveurAdminLockout');
                if (lockout) {
                    const { timestamp } = JSON.parse(lockout);
                    const elapsed = Date.now() - timestamp;
                    
                    if (elapsed < LOCKOUT_TIME) {
                        const remaining = Math.ceil((LOCKOUT_TIME - elapsed) / 1000);
                        showMessage(`🔒 Compte temporairement verrouillé. Réessayez dans ${remaining}s.`, 'error');
                        setLoading(true);
                        setTimeout(() => {
                            setLoading(false);
                            checkLockout(); 
                        }, remaining * 1000);
                        return true;
                    } else {
  
                        localStorage.removeItem('saveurAdminLockout');
                        loginAttempts = 0;
                    }
                }
                return false;
            }

            function setLockout() {
                localStorage.setItem('saveurAdminLockout', JSON.stringify({
                    timestamp: Date.now(),
                    attempts: loginAttempts
                }));
            }
              window.SaveurAdminAuth = {
                login: handleLogin,
                validateField,
                showMessage
            };
        });
    </script>
</body>
</html>
